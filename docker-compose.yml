services:
  homelab-registry-mcp:
    image: ghcr.io/teamcastaldi/homelab-registry-mcp:${REGISTRY_MCP_VERSION:-latest}
    container_name: homelab-registry-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8765
      DOCKER_BASE_URL: unix:///var/run/docker.sock
    ports:
      # Bind on all interfaces so Traefik on the workload node can reach this
      # container over the LAN. Routing is via a static backend in Traefik's
      # dynamic config (see docs/plans/phase-d.md) — no Docker label discovery
      # is used on the control-plane node.
      - "0.0.0.0:8765:8765"
    volumes:
      - registry-data:/data
      # Homelab repo (git-crypt encrypted .env files + Ansible inventory).
      # Lives on the Pi's local filesystem — GitHub is the backup, not the NAS.
      # Path must match SECRETS_REPO_PATH in .env.
      - /opt/homelab:/opt/homelab:rw
      # Read-only Docker socket: lets DockerDiscoverySource enumerate containers
      # with traefik.enable=true. Discovery is gated on DOCKER_BASE_URL below.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # SSH private key Ansible uses to reach workload nodes (hardware-discover-now's
      # fact-gather + Phase 7 adoption's SSH inspection) — same path in and out, like
      # /opt/homelab above, so it must match SSH_KEY_PATH in .env exactly. Falls back
      # to a harmless /dev/null-onto-itself mount when SSH_KEY_PATH is unset, so this
      # line is a no-op for operators not using either feature.
      - ${SSH_KEY_PATH:-/dev/null}:${SSH_KEY_PATH:-/dev/null}:ro

volumes:
  registry-data:
