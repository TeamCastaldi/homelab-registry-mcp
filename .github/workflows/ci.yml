name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]   # tag pushes trigger publish.yml, not CI
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, format, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest -q
