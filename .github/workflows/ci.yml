name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]   # tag pushes trigger publish.yml, not CI
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, format, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest -q

  ansible-lint:
    name: Ansible lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install --quiet ansible ansible-lint

      - name: Lint docker-stack-deploy role and playbooks
        env:
          ANSIBLE_ROLES_PATH: ansible/roles
        run: ansible-lint ansible/roles ansible/playbooks
