version: 2

# ⚠️  uv LIMITATION: Dependabot reads pyproject.toml and pip-style requirements
# files but does NOT parse uv.lock natively. It will detect top-level
# dependencies from pyproject.toml and open PRs for those, but transitive
# pinning in uv.lock is invisible to it.
#
# Workaround (recommended): add a CI step that runs
#   `uv export --no-dev -o requirements.txt`
# and commits the file. Point the pip ecosystem entry at that file for full
# transitive coverage. Until then, Dependabot covers direct deps only.

updates:
  # ── Python dependencies (runtime + dev) ──────────────────────────────────
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns:
          - "*"
        exclude-patterns:
          - "pytest*"
          - "ruff"
      python-dev:
        patterns:
          - "pytest*"
          - "ruff"

  # ── Docker base image ─────────────────────────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 2
    ignore:
      - dependency-name: "python"
        update-types:
          - version-update:semver-patch
    groups:
      docker-base:
        patterns:
          - "*"

  # ── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 3
    groups:
      github-actions:
        patterns:
          - "*"
